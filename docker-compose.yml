services:
  backend:
    build: .
    container_name: chat-backend
    expose:
      - "8000"
    restart: always
    networks:
      - appnet

  nginx:
    image: nginx:alpine
    container_name: chat-nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: always
    networks:
      - appnet

networks:
  appnet:
    driver: bridge